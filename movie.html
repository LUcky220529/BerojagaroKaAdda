<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>BerojgaroKaAdda - Movie Details</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800;900&family=Bebas+Neue&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="style.css"/>
  <style>
    body { padding-top: 60px; /* offset navbar */ }
    .movie-page { max-width: 1200px; margin: 40px auto; background: var(--surface); border-radius: 12px; overflow: hidden; border: 1px solid var(--border); box-shadow: 0 10px 30px rgba(0,0,0,0.5); position: relative; z-index: 10; }
    .modal-hero { height: 500px; } /* taller for full page */
    @media (max-width: 768px) {
      .movie-page { margin: 20px 10px; }
      .modal-hero { height: 300px; }
    }
  </style>
</head>
<body>

<!-- ===== NAVBAR ===== -->
<nav class="navbar" id="navbar">
  <div class="logo" onclick="window.location.href='index.html'" style="cursor:pointer">
    BerojgaroKaAdda
    <span>Rate Movies Apne Andaaz Mein</span>
  </div>
  <div class="search-wrap">
    <span class="s-icon">🔍</span>
    <input id="searchInput" class="search-input" type="text" placeholder="Search movies, series..." autocomplete="off"/>
    <div id="searchDropdown" class="search-dropdown hidden"></div>
  </div>
  <div class="nav-right">
    <button class="nav-btn" onclick="window.location.href='index.html'">🏠 Home</button>
    <button class="nav-btn" id="authBtn" onclick="window.loginUser && window.loginUser()">🔐 Sign In</button>
  </div>
</nav>

<!-- ===== PARTICLES ===== -->
<div class="particles" id="particles"></div>

<div class="movie-page">
  <div class="modal-hero" id="modalHero"></div>
  <div class="modal-body" id="modalBody"></div>
</div>

<!-- ===== NOTIFICATION ===== -->
<div class="notification hidden" id="notification"></div>

<!-- Firebase SDKs -->
<script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore-compat.js"></script>

<!-- App Logic -->
<script src="firebase-config.js"></script>
<script src="db.js"></script>
<script src="auth.js"></script>
<script src="app.js"></script>
</body>
</html>
