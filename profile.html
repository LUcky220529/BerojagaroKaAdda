<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>BerojgaroKaAdda - Profile</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800;900&family=Bebas+Neue&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="style.css"/>
  <style>
    body { padding-top: 80px; }
    .profile-container { max-width: 900px; margin: 0 auto 40px auto; padding: 20px; }
    
    .profile-header {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 30px;
      display: flex;
      align-items: center;
      gap: 20px;
      position: relative;
      overflow: hidden;
      box-shadow: 0 10px 30px rgba(0,0,0,0.5);
    }
    
    .profile-bg {
      position: absolute;
      top: 0; left: 0; width: 100%; height: 100px;
      background: linear-gradient(135deg, var(--primary), var(--secondary));
      z-index: 1;
      opacity: 0.8;
    }
    
    .profile-header-content {
      position: relative;
      z-index: 2;
      display: flex;
      align-items: flex-end;
      gap: 20px;
      margin-top: 40px;
      width: 100%;
    }

    .profile-avatar {
      width: 120px; height: 120px;
      border-radius: 50%;
      border: 4px solid var(--bg);
      background: var(--surface);
      display: flex; align-items: center; justify-content: center;
      font-size: 3rem; font-weight: bold; color: #fff;
      overflow: hidden;
      cursor: pointer;
      position: relative;
    }
    
    .profile-avatar img {
      width: 100%; height: 100%; object-fit: cover;
    }
    
    .profile-avatar-overlay {
      position: absolute; inset: 0; background: rgba(0,0,0,0.6);
      display: flex; align-items: center; justify-content: center;
      opacity: 0; transition: opacity 0.2s; font-size: 1rem; text-align: center;
    }
    
    .profile-avatar:hover .profile-avatar-overlay {
      opacity: 1;
    }

    .profile-info {
      flex: 1;
    }

    .profile-name {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 3rem;
      margin: 0; line-height: 1;
      text-shadow: 0 2px 4px rgba(0,0,0,0.5);
    }

    .profile-tabs {
      display: flex; gap: 15px; margin: 30px 0 20px 0;
      border-bottom: 1px solid var(--border); padding-bottom: 15px;
    }

    .ptab {
      background: none; border: none; color: var(--text-muted);
      font-size: 1.1rem; font-weight: 600; cursor: pointer;
      padding: 5px 10px; position: relative;
    }

    .ptab.active { color: var(--gold); }
    .ptab.active::after {
      content: ''; position: absolute; bottom: -16px; left: 0; right: 0;
      height: 3px; background: var(--gold); border-radius: 3px 3px 0 0;
    }

    .tab-content { display: none; }
    .tab-content.active { display: block; animation: fadeIn 0.4s ease; }

    .history-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
      gap: 15px;
    }
    
    .empty-state {
      text-align: center; padding: 50px 20px; color: var(--text-muted);
      background: var(--surface); border: 1px solid var(--border); border-radius: 12px;
    }

    @keyframes fadeIn { from { opacity:0; transform:translateY(10px); } to { opacity:1; transform:translateY(0); } }
  </style>
</head>
<body>

<!-- ===== NAVBAR ===== -->
<nav class="navbar scrolled" id="navbar">
  <div class="logo" onclick="window.location.href='index.html'" style="cursor:pointer">
    BerojgaroKaAdda
    <span>Rate Movies Apne Andaaz Mein</span>
  </div>
  <div class="nav-right">
    <button class="nav-btn" onclick="window.location.href='index.html'">🏠 Home</button>
    <button class="nav-btn" id="authBtn" onclick="window.loginUser && window.loginUser()">🔐 Sign In</button>
  </div>
</nav>

<!-- ===== PARTICLES ===== -->
<div class="particles" id="particles"></div>

<div class="profile-container">
  <div class="profile-header">
    <div class="profile-bg"></div>
    <div class="profile-header-content">
      <div class="profile-avatar" id="profileAvatar" onclick="updateAvatar()">
        <span id="avatarInitials">...</span>
        <div class="profile-avatar-overlay" id="avatarOverlay">Update Photo</div>
      </div>
      <div class="profile-info">
        <h1 class="profile-name" id="profileName">Loading...</h1>
      </div>
    </div>
  </div>

  <div class="profile-tabs" id="profileTabs">
    <button class="ptab active" onclick="switchTab('reviewsTab', this)">📝 Reviews</button>
    <button class="ptab" onclick="switchTab('watchedTab', this)">🎬 Watched</button>
    <button class="ptab" onclick="switchTab('historyTab', this)" id="historyTabBtn">▶️ History (Private)</button>
  </div>

  <div id="reviewsTab" class="tab-content active">
    <div id="userReviewsContainer"><div class="empty-state">Loading reviews...</div></div>
  </div>

  <div id="watchedTab" class="tab-content">
    <div class="history-grid" id="userWatchedContainer"><div class="empty-state">No movies marked as watched yet.</div></div>
  </div>

  <div id="historyTab" class="tab-content">
    <div class="history-grid" id="userHistoryContainer"><div class="empty-state">Loading watch history...</div></div>
  </div>
</div>

<!-- ===== NOTIFICATION ===== -->
<div class="notification hidden" id="notification"></div>

<!-- Firebase SDKs -->
<script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore-compat.js"></script>

<!-- App Logic -->
<script src="firebase-config.js"></script>
<script src="db.js"></script>
<script src="auth.js"></script>
<script src="app.js"></script>

<script>
  let targetUid = null;
  let isOwnProfile = false;

  document.addEventListener('DOMContentLoaded', async () => {
    // We must wait a bit for auth to resolve
    setTimeout(initProfile, 1000);
  });

  async function initProfile() {
    const params = new URLSearchParams(window.location.search);
    const paramUid = params.get('uid');
    const currentUser = window.getCurrentUser ? window.getCurrentUser() : null;

    if (paramUid) {
      targetUid = paramUid;
      isOwnProfile = (currentUser && currentUser.uid === paramUid);
    } else {
      if (!currentUser) {
        document.getElementById('profileName').textContent = 'Please sign in';
        document.getElementById('avatarInitials').textContent = '👤';
        document.getElementById('avatarOverlay').style.display = 'none';
        return;
      }
      targetUid = currentUser.uid;
      isOwnProfile = true;
    }

    if (!isOwnProfile) {
      document.getElementById('historyTabBtn').style.display = 'none';
      document.getElementById('avatarOverlay').style.display = 'none';
      document.getElementById('profileAvatar').style.cursor = 'default';
    }

    // Load Profile Info
    const profileData = await window.getPublicProfile(targetUid);
    if (!profileData) {
      document.getElementById('profileName').textContent = 'User not found';
      return;
    }

    document.getElementById('profileName').textContent = profileData.username || 'User';
    
    if (profileData.photoURL) {
      document.getElementById('profileAvatar').innerHTML = `<img src="${profileData.photoURL}" alt="Avatar">` + (isOwnProfile ? `<div class="profile-avatar-overlay">Update Photo</div>` : '');
    } else {
      document.getElementById('avatarInitials').textContent = (profileData.username || 'U').charAt(0).toUpperCase();
    }

    loadProfileReviews();
    loadProfileWatched();

    if (isOwnProfile && window.loadWatchHistory) {
      // Temporarily override renderContinueWatching
      const oldRender = window.renderContinueWatching;
      window.renderContinueWatching = (history) => {
        const c = document.getElementById('userHistoryContainer');
        if (!history || history.length === 0) {
          c.innerHTML = '<div class="empty-state">No movies watched yet.</div>';
          c.style.display = 'block';
        } else {
          c.style.display = 'grid';
          c.innerHTML = history.map(m => `
            <div class="movie-card" onclick="window.location.href='movie.html?id=${m.id}&type=${m.mediaType || 'movie'}'">
              <div class="card-poster">
                <img src="${m.poster}" alt="${m.title}"/>
              </div>
              <div class="card-info">
                <h3>${m.title}</h3>
              </div>
            </div>
          `).join('');
        }
      };
      window.loadWatchHistory();
    }
  }

  function switchTab(tabId, btn) {
    document.querySelectorAll('.ptab').forEach(b => b.classList.remove('active'));
    document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
    btn.classList.add('active');
    document.getElementById(tabId).classList.add('active');
  }

  function updateAvatar() {
    if (!isOwnProfile) return;
    let input = document.getElementById('avatarUploadInput');
    if (!input) {
      input = document.createElement('input');
      input.type = 'file';
      input.id = 'avatarUploadInput';
      input.accept = 'image/*';
      input.style.display = 'none';
      input.onchange = handleAvatarUpload;
      document.body.appendChild(input);
    }
    input.click();
  }

  function handleAvatarUpload(event) {
    const file = event.target.files[0];
    if (!file) return;

    const reader = new FileReader();
    reader.onload = (e) => {
      const img = new Image();
      img.onload = async () => {
        const canvas = document.createElement('canvas');
        const MAX_SIZE = 250; // keep it small to fit in firestore doc (1MB limit)
        let width = img.width;
        let height = img.height;

        if (width > height) {
          if (width > MAX_SIZE) {
            height *= MAX_SIZE / width;
            width = MAX_SIZE;
          }
        } else {
          if (height > MAX_SIZE) {
            width *= MAX_SIZE / height;
            height = MAX_SIZE;
          }
        }
        
        canvas.width = width;
        canvas.height = height;
        const ctx = canvas.getContext('2d');
        ctx.drawImage(img, 0, 0, width, height);
        
        // compress as jpeg
        const dataUrl = canvas.toDataURL('image/jpeg', 0.8);
        
        document.getElementById('profileAvatar').innerHTML = `<div style="padding:10px;font-size:0.8rem;">Uploading...</div>`;
        
        const success = await window.updateProfilePhoto(dataUrl);
        if (success) {
          document.getElementById('profileAvatar').innerHTML = `<img src="${dataUrl}" alt="Avatar"><div class="profile-avatar-overlay">Update Photo</div>`;
          if (window.showNotif) window.showNotif("Profile photo updated! 📸");
          loadProfileReviews(); // refresh to show new photo in own reviews
        } else {
          document.getElementById('profileAvatar').innerHTML = `<div class="profile-avatar-overlay">Failed</div>`;
          if (window.showNotif) window.showNotif("Failed to update photo 😢");
        }
      };
      img.src = e.target.result;
    };
    reader.readAsDataURL(file);
  }

  async function loadProfileReviews() {
    const container = document.getElementById('userReviewsContainer');
    const reviews = await window.getUserReviews(targetUid);

    if (reviews.length === 0) {
      container.innerHTML = '<div class="empty-state">No reviews written yet.</div>';
      return;
    }

    const currentUser = window.getCurrentUser ? window.getCurrentUser() : null;
    const currentUid = currentUser ? currentUser.uid : null;

    container.innerHTML = reviews.map(r => {
      const rId = r.id || `${r.movieId}_${r.uid}`;
      const likes = r.likes || [];
      const hasLiked = currentUid && likes.includes(currentUid);
      const comments = r.comments || [];
      const avatar = r.photoURL ? `<img src="${r.photoURL}" style="width:100%;height:100%;border-radius:50%;object-fit:cover;">` : r.username.charAt(0).toUpperCase();

      let commentsHtml = '';
      if (comments.length > 0) {
        commentsHtml = `<div style="margin-top:12px; padding-top:12px; border-top:1px solid rgba(255,255,255,0.1);">` +
          comments.map(c => `
            <div style="display:flex; gap:10px; margin-bottom:8px; font-size:0.85rem;">
              <div style="width:24px;height:24px;background:var(--primary);color:#fff;border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:bold;font-size:0.7rem;flex-shrink:0;">
                ${c.photoURL ? `<img src="${c.photoURL}" style="width:100%;height:100%;border-radius:50%;object-fit:cover;">` : c.username.charAt(0).toUpperCase()}
              </div>
              <div>
                <span style="font-weight:bold;">${c.username}</span>
                <span style="color:#ddd; margin-left:5px;">${c.text}</span>
              </div>
            </div>
          `).join('') + `</div>`;
      }

      return `
      <div class="review-card" style="margin-bottom: 15px; padding: 15px; background: var(--surface); border: 1px solid var(--border); border-radius: 8px;">
        <div style="display: flex; gap: 15px; margin-bottom: 15px; border-bottom: 1px solid rgba(255,255,255,0.05); padding-bottom: 12px;">
          ${r.moviePoster ? `<img src="${r.moviePoster}" style="width: 50px; height: 75px; border-radius: 4px; object-fit: cover; box-shadow: 0 2px 5px rgba(0,0,0,0.5);" alt="${r.movieTitle}">` : ''}
          <div style="flex: 1;">
            <div style="display: flex; justify-content: space-between; align-items: flex-start;">
              <h3 style="margin: 0 0 5px 0; font-size: 1.1rem; color: #fff;">${r.movieTitle || 'Unknown Movie'}</h3>
              <button class="btn-ghost" style="padding: 4px 10px; font-size: 0.75rem;" onclick="window.location.href='movie.html?id=${r.movieId}&type=${r.mediaType||'movie'}'">View Movie</button>
            </div>
            
            <div style="display: flex; align-items: center; gap: 8px; margin-top: 5px;">
              <div style="width:20px; height:20px; background: var(--primary); color: #fff; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: bold; font-size: 0.7rem; overflow:hidden;">
                ${avatar}
              </div>
              <span style="font-weight: 500; font-size: 0.85rem; color: var(--text-muted);">${r.username}</span>
              <span style="color:var(--gold); font-size: 0.85rem; margin-left: 5px;">${r.emoji} ${r.label}</span>
            </div>
          </div>
        </div>
        ${r.text ? `<p style="margin: 0 0 12px 0; color: #ddd; font-size: 0.9rem; line-height: 1.5;">${r.text}</p>` : ''}
        
        <div style="display:flex; gap:15px; align-items:center; font-size:0.85rem; color:var(--text-muted);">
          <button onclick="handleToggleLike('${rId}')" style="background:none; border:none; color:inherit; cursor:pointer; display:flex; align-items:center; gap:5px; padding:0; ${hasLiked ? 'color:var(--gold);' : ''}">
            ${hasLiked ? '❤️' : '🤍'} ${likes.length}
          </button>
          <button onclick="document.getElementById('profile-comment-${rId}').classList.toggle('hidden')" style="background:none; border:none; color:inherit; cursor:pointer; display:flex; align-items:center; gap:5px; padding:0;">
            💬 ${comments.length}
          </button>
          <span style="margin-left:auto; font-size:0.75rem;">${r.date}</span>
        </div>

        <div id="profile-comment-${rId}" class="hidden" style="margin-top:10px; display:flex; gap:8px;">
          <input type="text" id="comment-input-${rId}" placeholder="Write a comment..." style="flex:1; padding:8px 12px; border-radius:20px; border:1px solid var(--border); background:rgba(255,255,255,0.05); color:#fff; font-size:0.85rem;">
          <button onclick="handleAddComment('${rId}')" style="background:var(--primary); color:#fff; border:none; border-radius:20px; padding:0 15px; font-weight:bold; cursor:pointer; font-size:0.85rem;">Post</button>
        </div>

        ${commentsHtml}
      </div>
      `;
    }).join('');
  }

  async function loadProfileWatched() {
    const container = document.getElementById('userWatchedContainer');
    if (!container || !window.getUserWatchedMovies) return;

    const watched = await window.getUserWatchedMovies(targetUid);
    if (watched.length === 0) {
      container.innerHTML = '<div class="empty-state">No movies marked as watched yet.</div>';
      return;
    }

    container.innerHTML = watched.map(m => `
      <div class="movie-card" onclick="window.location.href='movie.html?id=${m.id}&type=${m.mediaType || 'movie'}'">
        <div class="card-poster">
          <img src="${m.poster}" alt="${m.title}"/>
        </div>
        <div class="card-info">
          <h3>${m.title}</h3>
        </div>
      </div>
    `).join('');
  }

</script>
</body>
</html>
