<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Person Profile | BerojgaroKaAdda</title>
  <link rel="stylesheet" href="style.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
  <style>
    .person-page { padding: 100px 40px 40px; max-width: 1200px; margin: 0 auto; }
    .person-header { display: flex; gap: 40px; margin-bottom: 60px; align-items: flex-start; }
    .person-profile { width: 300px; flex-shrink: 0; border-radius: 20px; overflow: hidden; box-shadow: 0 20px 40px rgba(0,0,0,0.5); border: 1px solid var(--border); }
    .person-profile img { width: 100%; display: block; }
    .profile-placeholder { width: 300px; height: 450px; background: var(--surface); display: flex; align-items: center; justify-content: center; font-size: 5rem; color: #333; }
    .person-info h1 { font-family: 'Bebas Neue', sans-serif; font-size: 4rem; margin-bottom: 10px; letter-spacing: 2px; color: var(--gold); }
    .person-meta { display: flex; gap: 20px; color: var(--text-muted); margin-bottom: 25px; font-weight: 500; }
    .person-bio { line-height: 1.8; font-size: 1.1rem; color: #ccc; white-space: pre-line; }
    .person-projects { margin-top: 40px; }
    
    @media (max-width: 900px) {
      .person-header { flex-direction: column; align-items: center; text-align: center; }
      .person-page { padding: 80px 20px 20px; }
    }
  </style>
</head>
<body>

  <!-- ===== NAVBAR ===== -->
  <nav class="navbar" id="navbar">
    <div class="logo" onclick="window.location.href='index.html'" style="cursor:pointer">
      BerojgaroKaAdda
      <span>Rate Movies Apne Andaaz Mein</span>
    </div>
    <div class="search-wrap">
      <span class="s-icon">🔍</span>
      <input id="searchInput" class="search-input" type="text" placeholder="Search movies, series..." autocomplete="off"/>
      <div id="searchDropdown" class="search-dropdown hidden"></div>
    </div>
    <div class="nav-right">
      <button class="nav-btn" onclick="window.location.href='index.html'">🏠 Home</button>
      <button class="nav-btn" id="authBtn" onclick="window.loginUser && window.loginUser()">🔐 Sign In</button>
    </div>
  </nav>

  <!-- ===== PARTICLES ===== -->
  <div class="particles" id="particles"></div>

  <div class="person-page">
    <div id="personContainer">
      <div class="loader"></div>
    </div>
  </div>

  <!-- Modal Container (for movie clicks) -->
  <div class="modal-overlay hidden" id="modalOverlay" onclick="closeModalOnOverlay(event)">
    <div class="movie-modal">
      <button class="close-modal" onclick="closeModal()">×</button>
      <div id="modalHero" class="modal-hero"></div>
      <div class="modal-body" id="modalBody"></div>
    </div>
  </div>

  <!-- Notification -->
  <div class="notification hidden" id="notification"></div>

  <!-- Scripts -->
  <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore-compat.js"></script>
  <script src="firebase-config.js"></script>
  <script src="db.js"></script>
  <script src="auth.js"></script>
  <script src="app.js"></script>
</body>
</html>
